# ============================================================
# Server Configuration
# ============================================================
server.port=${SERVER_PORT:8081}

# ============================================================
# Database Configuration
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/online_banking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT Configuration (HS512 — key must be at least 64 bytes)
# ============================================================
app.jwt.secret=${JWT_SECRET:REPLACE_WITH_A_64_BYTE_HEX_SECRET_KEY_FOR_PRODUCTION}
# Standard session expiry (24 hours)
app.jwt.expiration-milliseconds=86400000
# "Remember Me" expiry (30 days)
app.jwt.remember-me-expiration-milliseconds=2592000000

# ============================================================
# OTP Configuration
# ============================================================
# Demo mode: when true, the forgot-password API returns the OTP in the response
# body instead of sending it via email. Set to false for production.
app.otp.demo-mode=${OTP_DEMO_MODE:true}

# ============================================================
# Spring Mail (Gmail SMTP)
# ============================================================
# To enable real email delivery:
#   1. Enable 2-Step Verification on the Gmail account.
#   2. Create an App Password at https://myaccount.google.com/apppasswords
#   3. Set MAIL_USERNAME and MAIL_PASSWORD environment variables (or edit below).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ============================================================
# File Upload (KYC Documents)
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
